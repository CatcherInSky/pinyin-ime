name: Deploy demo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install and build site (pinyin-ime from npm)
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          pnpm install --frozen-lockfile
          pnpm run site:build

      - name: Deploy to CatcherInSky.github.io/pinyin-ime
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_IO_TOKEN }}
          external_repository: CatcherInSky/CatcherInSky.github.io
          publish_branch: source
          publish_dir: site/dist
          destination_dir: pinyin-ime
          keep_files: true
