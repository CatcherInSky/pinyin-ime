name: Deploy demo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install and build site (pinyin-ime from npm)
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          pnpm install --frozen-lockfile
          pnpm run site:build
          test -f site/dist/.nojekyll

      - name: Deploy to CatcherInSky.github.io/pinyin-ime
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_IO_TOKEN }}
          external_repository: CatcherInSky/CatcherInSky.github.io
          publish_branch: source
          publish_dir: site/dist
          # Hexo in CatcherInSky.github.io has `source_dir: source`, so deploy under `source/`
          # to ensure the files are picked up and published to `master` (GitHub Pages).
          destination_dir: source/pinyin-ime
          keep_files: true

      - name: Trigger Hexo rebuild for /pinyin-ime
        env:
          GH_TOKEN: ${{ secrets.GH_IO_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/CatcherInSky/CatcherInSky.github.io/dispatches \
            -d '{"event_type":"pinyin-ime"}'
